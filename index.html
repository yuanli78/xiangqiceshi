<div class="header"><h2>📜 源力象棋 · 三十六计+聊斋全系 · 可走位置提示</h2></div>

  <canvas id="chessCanvas" width="2400" height="1800"></canvas>
</div>
<div class="control-bar">
  <div class="status-bar" id="statusBar">🔹 点击棋子查看可走位置</div>

  <div class="counter red" id="redCount">🔴 红方: 167</div>
  <button class="btn" id="autoPlayBtn">▶️ 开始自动对战</button>
  <button class="btn" id="pauseBtn" disabled>⏸️ 暂停</button>
  <button class="btn" id="resetBtn">⟳ 复位并居中</button>
  <button class="btn" id="undoBtn">↩️ 悔棋</button>
  <div class="log-window" id="logPanel"><div class="log-entry">📋 三十六计第三批+聊斋全系已加入 · 点击棋子显示合法移动位置</div></div>
</div>
